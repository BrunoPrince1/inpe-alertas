name: CI com ESLint e Testes

on:
  push:
    branches: [ dev ]
  pull_request:
    branches: [ dev ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Baixar o código do repositório
      - name: Checkout do repositório
        uses: actions/checkout@v4

      # 2. Instalar Node.js (Ambiente necessário para o ESLint)
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # 3. Instalar dependências (Garante que o ESLint e plugins estejam lá)
      - name: Instalar dependências
        run: npm install

      # 4. Rodar ESLint (Análise de qualidade do código)
      - name: Rodar ESLint
        run: npx eslint .

      #5. Rodar JEST (Aula 05)  
      - name: Rodar Jest
        run: npx test
